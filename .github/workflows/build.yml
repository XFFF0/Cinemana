name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
    
    - name: Cache Swift packages
      uses: actions/cache@v3
      with:
        path: |
          ~/Library/Developer/Xcode/DerivedData
          .build
        key: ${{ runner.os }}-spm-${{ hashFiles('**/project.yml') }}
        restore-keys: |
          ${{ runner.os }}-spm-
    
    - name: Install XcodeGen
      run: |
        brew install xcodegen
    
    - name: Generate Xcode project
      run: xcodegen generate
    
    - name: Resolve Swift Package Manager dependencies
      run: xcodebuild -resolvePackageDependencies -project Cinemana.xcodeproj -scheme Cinemana
    
    - name: Build for iOS Simulator
      run: |
        xcodebuild -project Cinemana.xcodeproj \
          -scheme Cinemana \
          -configuration Debug \
          -destination 'platform=iOS Simulator,name=iPhone 15' \
          build
    
    - name: Build IPA
      run: |
        xcodebuild -project Cinemana.xcodeproj \
          -scheme Cinemana \
          -configuration Release \
          -destination 'generic/platform=iOS' \
          -archivePath ./Cinemana.xcarchive \
          archive
        
        xcodebuild -exportArchive \
          -archivePath ./Cinemana.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath ./output
    
    - name: Upload IPA
      uses: actions/upload-artifact@v3
      with:
        name: Cinemana-IPA
        path: ./output/Cinemana.ipa
    
    - name: Upload Xcode archive
      uses: actions/upload-artifact@v3
      with:
        name: Cinemana-xcarchive
        path: ./Cinemana.xcarchive
